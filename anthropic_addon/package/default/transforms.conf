# ============================================================
# Lookup definitions for Anthropic TA enrichment
# ============================================================

[anthropic_error_codes]
filename = anthropic_error_codes.csv
default_match = true
match_type = WILDCARD(error_code)
max_matches = 1

[anthropic_models]
filename = anthropic_models.csv
default_match = true
match_type = WILDCARD(model)
max_matches = 1
