# ============================================================
# Anthropic Usage Logs  (anthropic:usage:logs)
# Maps to Splunk CIM: Application State data model
# ============================================================
[anthropic:usage:logs]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
CHARSET = UTF-8
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
TIME_PREFIX = "start_time":
MAX_TIMESTAMP_LOOKAHEAD = 25
KV_MODE = json
AUTO_KV_JSON = true
TRUNCATE = 0

# CIM Application State field mappings
# object — the model used (claude-opus-4-6, claude-sonnet-4-6, etc.)
FIELDALIAS-object = model AS object

# vendor_product static value
EVAL-vendor_product = "Anthropic"

# dest — Anthropic API endpoint
EVAL-dest = "api.anthropic.com"

# Total tokens (input + output, excluding cache)
EVAL-total_tokens = coalesce(input_tokens, 0) + coalesce(output_tokens, 0) + coalesce(cache_creation_input_tokens, 0) + coalesce(cache_read_input_tokens, 0)

# Cost estimation via lookup (tokens × rate, cache-aware)
LOOKUP-anthropic_model_rates = anthropic_models model OUTPUT input_cost_per_1k_tokens, output_cost_per_1k_tokens, cache_read_cost_per_1k_tokens
EVAL-cost_usd = round( \
    (coalesce(input_tokens, 0) / 1000 * input_cost_per_1k_tokens) + \
    (coalesce(output_tokens, 0) / 1000 * output_cost_per_1k_tokens) + \
    (coalesce(cache_creation_input_tokens, 0) / 1000 * input_cost_per_1k_tokens) + \
    (coalesce(cache_read_input_tokens, 0) / 1000 * cache_read_cost_per_1k_tokens), 6)

# Cache savings: what it would have cost without caching minus what was actually charged
EVAL-cache_savings_usd = round( \
    (coalesce(cache_read_input_tokens, 0) / 1000 * input_cost_per_1k_tokens) - \
    (coalesce(cache_read_input_tokens, 0) / 1000 * cache_read_cost_per_1k_tokens), 6)


# ============================================================
# Anthropic Claude Code Analytics  (anthropic:usage:claude_code)
# Maps to Splunk CIM: Application State data model
# ============================================================
[anthropic:usage:claude_code]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
CHARSET = UTF-8
TIME_FORMAT = %Y-%m-%dT%H:%M:%SZ
TIME_PREFIX = "start_time":
MAX_TIMESTAMP_LOOKAHEAD = 25
KV_MODE = json
AUTO_KV_JSON = true
TRUNCATE = 0

# CIM Application State field mappings
EVAL-vendor_product = "Anthropic"
EVAL-dest = "api.anthropic.com"

# Map user_id to CIM user field
FIELDALIAS-user = user_id AS user
