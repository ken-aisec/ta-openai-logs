# ============================================================
# Anthropic TA Event Types
# CIM: Application State data model
# ============================================================

# All usage log events → Application State model
[anthropic_application_state]
search = sourcetype="anthropic:usage:logs" OR sourcetype="anthropic:usage:claude_code"
tags = application state

# Message/completion usage events by model
[anthropic_completion_usage]
search = sourcetype="anthropic:usage:logs" model=*
tags = application state

# Claude Code developer activity events
[anthropic_claude_code_usage]
search = sourcetype="anthropic:usage:claude_code"
tags = application state
