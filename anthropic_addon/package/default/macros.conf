# ============================================================
# Search macros for Anthropic TA
# Override index values in local/macros.conf after deployment
# ============================================================

# Index macro for usage logs
[anthropic_usage_index]
definition = index=* sourcetype="anthropic:usage:logs"
iseval = 0

# Index macro for Claude Code analytics
[anthropic_claude_code_index]
definition = index=* sourcetype="anthropic:usage:claude_code"
iseval = 0

# Combined all Anthropic logs
[anthropic_all_logs]
definition = index=* (sourcetype="anthropic:usage:logs" OR sourcetype="anthropic:usage:claude_code")
iseval = 0

# Cost macro — cache-aware cost calculation
# Args: input_tokens, output_tokens, cache_creation_tokens, cache_read_tokens, model
[anthropic_cost_calc(5)]
args = input_tokens, output_tokens, cache_creation_tokens, cache_read_tokens, model
definition = eval cost_usd=round( ('$input_tokens$' / 1000 * input_cost_per_1k_tokens) + ('$output_tokens$' / 1000 * output_cost_per_1k_tokens) + ('$cache_creation_tokens$' / 1000 * input_cost_per_1k_tokens) + ('$cache_read_tokens$' / 1000 * cache_read_cost_per_1k_tokens), 6)
iseval = 0
