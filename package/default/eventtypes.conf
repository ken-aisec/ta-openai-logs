# ============================================================
# OpenAI TA Event Types
# CIM: Authentication and Application State data models
# ============================================================

# All audit log events → Authentication model
[openai_authentication]
search = sourcetype="openai:audit:logs"
tags = authentication

# Login/access events
[openai_authentication_login]
search = sourcetype="openai:audit:logs" type="login.*" OR type="api_key.created" OR type="api_key.deleted"
tags = authentication

# Account management events
[openai_account_management]
search = sourcetype="openai:audit:logs" type="organization.*" OR type="project.*" OR type="user.*"
tags = authentication

# All usage log events → Application State model
[openai_application_state]
search = sourcetype="openai:usage:logs"
tags = application state

# Specific model usage
[openai_completion_usage]
search = sourcetype="openai:usage:logs" model=*
tags = application state
