# ============================================================
# OpenAI Usage Logs  (openai:usage:logs)
# Maps to Splunk CIM: Application State data model
# ============================================================
[openai:usage:logs]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
CHARSET = UTF-8
TIME_FORMAT = %s
TIME_PREFIX = "start_time":
MAX_TIMESTAMP_LOOKAHEAD = 12
KV_MODE = json
AUTO_KV_JSON = true
TRUNCATE = 0

# CIM Application State field mappings
# object — the model used (gpt-4, gpt-3.5-turbo, etc.)
FIELDALIAS-object = model AS object

# vendor_product static value
EVAL-vendor_product = "OpenAI"

# dest — OpenAI API endpoint
EVAL-dest = "api.openai.com"

# Custom token fields (already present in raw JSON)
# prompt_tokens, completion_tokens, total_tokens available natively

# Cost estimation via lookup (tokens × rate)
LOOKUP-openai_model_rates = openai_models model OUTPUT input_cost_per_1k_tokens, output_cost_per_1k_tokens
EVAL-cost_usd = round( (prompt_tokens / 1000 * input_cost_per_1k_tokens) + (completion_tokens / 1000 * output_cost_per_1k_tokens), 6)


# ============================================================
# OpenAI Audit Logs  (openai:audit:logs)
# Maps to Splunk CIM: Authentication data model
# ============================================================
[openai:audit:logs]
SHOULD_LINEMERGE = false
LINE_BREAKER = ([\r\n]+)
NO_BINARY_CHECK = true
CHARSET = UTF-8
TIME_FORMAT = %s
TIME_PREFIX = "effective_at":
MAX_TIMESTAMP_LOOKAHEAD = 12
KV_MODE = json
AUTO_KV_JSON = true
TRUNCATE = 0

# CIM Authentication field mappings
# user — who performed the action (email preferred, fallback to id)
EVAL-user = coalesce('actor.session.user.email', 'actor.api_key.user.email', 'actor.session.user.id')

# src_ip — originating IP
FIELDALIAS-src_ip = actor.session.ip_address AS src_ip

# action — what was done
FIELDALIAS-action = type AS action

# app — project context
FIELDALIAS-app = project.id AS app

# dest — target system
EVAL-dest = "api.openai.com"

# vendor_product
EVAL-vendor_product = "OpenAI"

# Normalize action to CIM Authentication values
# success/failure based on type suffix or explicit field
EVAL-status = if(match(type, "(?i)(fail|error|denied|reject)"), "failure", "success")

# Enrich error codes
LOOKUP-openai_error_codes = openai_error_codes error_code OUTPUT error_description
