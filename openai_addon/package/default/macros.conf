# ============================================================
# Search macros for OpenAI TA
# Override index values in local/macros.conf after deployment
# ============================================================

# Index macro for usage logs
[openai_usage_index]
definition = index=* sourcetype="openai:usage:logs"
iseval = 0

# Index macro for audit logs
[openai_audit_index]
definition = index=* sourcetype="openai:audit:logs"
iseval = 0

# Combined all OpenAI logs
[openai_all_logs]
definition = index=* (sourcetype="openai:usage:logs" OR sourcetype="openai:audit:logs")
iseval = 0

# Macro to compute cost — override input_cost and output_cost if needed
[openai_cost_calc(3)]
args = prompt_tokens, completion_tokens, model
definition = eval cost_usd=round(('$prompt_tokens$' / 1000 * input_cost_per_1k_tokens) + ('$completion_tokens$' / 1000 * output_cost_per_1k_tokens), 6)
iseval = 0
