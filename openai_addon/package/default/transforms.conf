# ============================================================
# Lookup definitions for OpenAI TA enrichment
# ============================================================

[openai_error_codes]
filename = openai_error_codes.csv
default_match = true
match_type = WILDCARD(error_code)
max_matches = 1

[openai_models]
filename = openai_models.csv
default_match = true
match_type = WILDCARD(model)
max_matches = 1
